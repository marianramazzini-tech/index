<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMA | Respira Naturaleza</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Pinyon+Script&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blanco-lino: #fbfaf8;
            --verde-eucalipto: #2c3e35;
            --verde-suave: #4e5d56;
            --oro-viejo: #bd9b7d;
            --crema-seda: #f5f2eb;
            --transicion: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: var(--blanco-lino);
            color: var(--verde-eucalipto);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 50px;
            background-color: rgba(251, 250, 248, 0.95);
            z-index: 1000;
            border-bottom: 1px solid rgba(44, 62, 53, 0.05);
        }

        .submenu {
            display: flex;
            gap: 25px;
        }

        .submenu a {
            text-decoration: none;
            color: var(--verde-eucalipto);
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: var(--transicion);
            font-weight: 300;
        }

        .submenu a:hover { color: var(--oro-viejo); }

        /* Botón Menú Derecho */
        .menu-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: none;
            border: none;
            color: var(--verde-eucalipto);
            transition: var(--transicion);
        }

        .menu-toggle:hover { color: var(--oro-viejo); }

        .hamburger {
            width: 20px;
            height: 1px;
            background-color: var(--verde-eucalipto);
            position: relative;
        }
        .hamburger::before, .hamburger::after {
            content: '';
            width: 20px;
            height: 1px;
            background-color: var(--verde-eucalipto);
            position: absolute;
            left: 0;
        }
        .hamburger::before { top: -6px; }
        .hamburger::after { top: 6px; }

        /* --- MENÚ LATERAL DESPLEGABLE --- */
        .side-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            height: 100%;
            background-color: var(--verde-eucalipto);
            color: var(--blanco-lino);
            z-index: 2000;
            padding: 100px 60px;
            transition: var(--transicion);
            display: flex;
            flex-direction: column;
            gap: 30px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }

        .side-menu.active { right: 0; }

        .close-menu {
            position: absolute;
            top: 40px;
            right: 50px;
            cursor: pointer;
            font-size: 2rem;
            font-weight: 200;
        }

        .side-menu h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            border-bottom: 1px solid rgba(251, 250, 248, 0.2);
            padding-bottom: 15px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .side-menu a {
            color: var(--blanco-lino);
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 300;
            transition: 0.3s;
        }

        .side-menu a:hover { padding-left: 15px; color: var(--oro-viejo); }
